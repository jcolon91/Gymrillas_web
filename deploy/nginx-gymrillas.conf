# ============================================================
# GYMRILLAS — Nginx
# Copia a /etc/nginx/sites-available/gymrillas y enlaza:
#   sudo ln -s /etc/nginx/sites-available/gymrillas /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
# SSL: sudo certbot --nginx -d gymrillas.com -d www.gymrillas.com
# ============================================================

server {
    listen 80;
    server_name gymrillas.com www.gymrillas.com;

    # Certbot insertará aquí la redirección a HTTPS al correr.
    client_max_body_size 12M;

    # Compresión (imágenes webp/mp4 ya vienen comprimidas; esto ayuda a html/css/js/json).
    gzip on;
    gzip_vary on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml;

    # Todo pasa al backend Node (sirve API + /admin + storefront)
    location / {
        proxy_pass http://127.0.0.1:4000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 90s;
    }

    # Cache de imágenes subidas
    location /uploads/ {
        proxy_pass http://127.0.0.1:4000;
        proxy_cache_valid 200 7d;
        expires 7d;
        add_header Cache-Control "public";
    }
}

